[build-system]
requires = ["setuptools>=68.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "doctest-expect"
version = "0.1.0"
description = "CLI output assertion tool for documentation testing"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}

[project.scripts]
# Short names for use in documentation
expect = "doctest_expect:main"
chk = "doctest_expect:main"

[project.optional-dependencies]
dev = ["pytest>=7.0"]
